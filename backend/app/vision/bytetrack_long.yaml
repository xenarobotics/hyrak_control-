# ByteTrack config — extended track buffer so a person temporarily out of
# frame keeps their ID for up to ~3 seconds at 30 fps.
tracker_type: bytetrack
track_high_thresh: 0.5
track_low_thresh: 0.1
new_track_thresh: 0.6
track_buffer: 90        # frames to hold a track after last detection (default 30)
match_thresh: 0.8
